name: Android CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Check Flutter & Dart version
        run: |
          flutter --version

      - name: Flutter clean
        run: flutter clean

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Decode Firebase service account
        run: |
          echo "${FIREBASE_SERVICE_ACCOUNT}" > service_account.json

      - name: Build APK
        run: flutter build apk --release

      - name: Distribute APK to Firebase
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
          --app ${{ secrets.FIREBASE_ANDROID_APP_ID }} \
          --groups "qa-team" \
          --release-notes "CI build from GitHub"
          --token "$(cat service_account.json)"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
